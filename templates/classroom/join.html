{% extends "base.html" %}
{% block title %}Join Classroom{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <h2 class="text-center mb-4">Join a Classroom</h2>
        <form method="POST">
            <div class="mb-4">
                <label for="code" class="form-label">Classroom Code</label>
                <input type="text" class="form-control form-control-lg" id="code" name="code"
                       placeholder="e.g., ECON101" required autofocus
                       style="text-transform: uppercase;">
                <div class="form-text">Enter the code provided by your instructor.</div>
            </div>
            <button type="submit" class="btn btn-success btn-lg w-100">Join</button>
        </form>
        <div class="text-center mt-3">
            <a href="{{ url_for('main.index') }}" class="text-muted">Back to home</a>
        </div>
    </div>
</div>
{% endblock %}
