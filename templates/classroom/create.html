{% extends "base.html" %}
{% block title %}Create Classroom{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4">
        <h2 class="text-center mb-4">Create a Classroom</h2>
        <form method="POST">
            <div class="mb-3">
                <label for="code" class="form-label">Classroom Code</label>
                <input type="text" class="form-control form-control-lg" id="code" name="code"
                       value="{{ code }}" placeholder="e.g., ECON101" required autofocus
                       style="text-transform: uppercase;">
                <div class="form-text">Students will use this code to join your classroom.</div>
            </div>
            <div class="mb-3">
                <label for="name" class="form-label">Classroom Name</label>
                <input type="text" class="form-control form-control-lg" id="name" name="name"
                       value="{{ name }}" placeholder="e.g., Intro to Behavioral Economics" required>
            </div>
            <div class="mb-4">
                <label for="host_password" class="form-label">Host Password</label>
                <input type="password" class="form-control form-control-lg" id="host_password" name="host_password"
                       placeholder="Choose a host password" required>
                <div class="form-text">You'll need this to access the host dashboard.</div>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">Create Classroom</button>
        </form>
        <div class="text-center mt-3">
            <a href="{{ url_for('main.index') }}" class="text-muted">Back to home</a>
        </div>
    </div>
</div>
{% endblock %}
