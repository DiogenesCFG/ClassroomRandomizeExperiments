{% extends "base.html" %}
{% block title %}Host Login{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <h2 class="text-center mb-4">Host a Classroom</h2>
        <form method="POST">
            <div class="mb-3">
                <label for="code" class="form-label">Classroom Code</label>
                <input type="text" class="form-control form-control-lg" id="code" name="code"
                       placeholder="e.g., ECON101" required autofocus
                       style="text-transform: uppercase;">
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Host Password</label>
                <input type="password" class="form-control form-control-lg" id="password" name="password"
                       placeholder="Enter host password" required>
            </div>
            <button type="submit" class="btn btn-warning btn-lg w-100">Enter Dashboard</button>
        </form>
        <div class="text-center mt-3">
            <a href="{{ url_for('main.index') }}" class="text-muted">Back to home</a>
        </div>
    </div>
</div>
{% endblock %}
