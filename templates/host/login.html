{% extends "base.html" %}

{% block title %}Host Login{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <h2 class="text-center mb-4">Host Dashboard</h2>
        <form method="GET" action="{{ url_for('host.dashboard') }}">
            <div class="mb-3">
                <label for="token" class="form-label">Access Token</label>
                <input type="password" class="form-control form-control-lg" id="token" name="token"
                       placeholder="Enter host token" required autofocus>
            </div>
            <button type="submit" class="btn btn-warning btn-lg w-100">Enter Dashboard</button>
        </form>
    </div>
</div>
{% endblock %}
